<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Prompt</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/main.js"></script>
</head>
<body>
  <div class="terminal" id="terminalServer">
    <h2>Server</h2>
    <div id="serverOutput"></div>
    <input type="text" id="serverInput" placeholder="Enter server command...">
    <button id="serverSend">Send</button>
  </div>
  <div class="terminal" id="terminalClient">
    <h2>Client</h2>
    <div id="clientOutput"></div>
    <input type="text" id="clientInput" placeholder="Enter client command...">
    <button id="clientSend">Send</button>
  </div>
</body>
</html>
